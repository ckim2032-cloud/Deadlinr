<!DOCTYPE html>
<html lang="en">
<style>
      .sidebar {
            background: gray; 
      }
      .main {
            background: white;
      }
      #plus {
            color: green;
      }
      .subject-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
      }
      
      .subject-modal-content {
        background: white;
        margin: 15% auto;
        padding: 20px;
        width: 300px;
        border-radius: 10px;
      }
      
      .close {
        float: right;
        cursor: pointer;
      }
</style>
<head>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
      <link href="https://fonts.googleapis.com/css2?family=Goldman&display=swap" rel="stylesheet"> 
      <link rel="stylesheet" href="style_home.css">
    </head>

  <body>
      <div class="main-page">
        <h2 class="title">id="welcomeMessage"></h2>
        <strong>Your subjects:</strong>
        <ul>
            <li>Test</li>
            <li>Test</li>
        </ul>
        <button onclick="openSubjectAdder()"><span id="plus">+</span>Add subject</button>

      <div id="modal" class="subject-modal">
        <div class="subject-modal-content">
          <span onclick="closeSubjectAdder()" class="close">&times;</span>
          <h2>What subject would you ike to add? </h2>
          <input type="text" id="subject" required>
          <button onclick="storeSubject()">Add subject</button>
        </div>
      </div>
       
    </div>

</body>
