<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deadlinr</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  </head>
<body>
  <div id="sidebar">
    <img id="logo" src="images/logo.png" alt="Deadlinr Logo" onerror="this.style.display='none'; this.after('DEADLINR'); this.nextSibling.style='font-family:Oswald; font-size:1.5rem; color:#2563eb; font-weight:bold;'">
  </div>
  
  <div class="main-page">
    <h1 id="welcomeMessage"></h1>
    <div class="controls">
      <button id="add-class-btn">Add class +</button>
      <button id="delete-class-btn">Delete class -</button>
      <button id="add-row-btn">Add row +</button>
    </div>

    <div class="table-wrapper">
      <table class="deadlinr-table" id="assignment-table">
        <thead>
          <tr>
            <th style="width: 35%;">Assignment</th>
            <th style="width: 20%;">Class</th>
            <th style="width: 15%;">Status</th>
            <th style="width: 20%;">Due Date</th>
            <th style="width: 10%;">Actions</th>
          </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
