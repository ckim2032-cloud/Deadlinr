<!DOCTYPE html>
<html lang="en">
<style>
      body {
            font-family: Goldman, sans-serif;
      }
      .main-page {
            background: white;
      }
      #plus {
            color: #3bda3b;
            background-color: #a5f2a5;
            float: right;
            cursor: pointer;
      }
      .subject-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
      }
      
      .subject-modal-content {
            background: white;
            margin: 15% auto;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
      }
      
      .close {
            color: #dc3737;
            background-color: #ea7a7a;
            float: right;
            cursor: pointer;
      }
      #subject-button {
            background-color: gray;
            width: 90%;
      }
</style>
<head>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>

  <body>
      <div class="main-page">
        <h2><strong>id="welcomeMessage"</strong></h2>
       <div style="text-align: right">
            <button onclick="openSubjectAdder()" id="subject-button"><span id="plus">+</span>Add subject</button>
       </div>
      <div id="modal" class="subject-modal">
        <div class="subject-modal-content">
          <span onclick="closeSubjectAdder()" class="close">&times;</span>
          <h2>What subject would you ike to add? </h2>
          <input type="text" id="subject" required>
          <button onclick="storeSubject()">Add subject</button>
        </div>
      </div>
       
    </div>

</body>
</html>
