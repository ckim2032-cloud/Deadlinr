<!DOCTYPE html>
<html lang="en">
<style>
      .main-page {
            background: white;
      }
      #plus {
            color: darkgreen;
            background-color: green;
            float: right;
            cursor: pointer;
      }
      .subject-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
      }
      
      .subject-modal-content {
            background: white;
            margin: 15% auto;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
      }
      
      .close {
            color: darkred;
            background-color: red;
            float: right;
            cursor: pointer;
      }
      #subject-button {
            background-color: gray;
            width: 10%;
      }
</style>
<head>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
      <link href="https://fonts.googleapis.com/css2?family=Goldman&display=swap" rel="stylesheet"> 
    </head>

  <body>
      <div class="main-page">
        <h2><strong>id="welcomeMessage"</strong></h2>
       
        <button onclick="openSubjectAdder()" id="subject-button" style="text-align: right;"><span id="plus">+</span>Add subject</button>

      <div id="modal" class="subject-modal">
        <div class="subject-modal-content">
          <span onclick="closeSubjectAdder()" class="close">&times;</span>
          <h2>What subject would you ike to add? </h2>
          <input type="text" id="subject" required>
          <button onclick="storeSubject()">Add subject</button>
        </div>
      </div>
       
    </div>

</body>
</html>
