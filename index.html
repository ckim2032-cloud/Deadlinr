<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deadlinr</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="sidebar">
    <img id="logo" src="images/logo.png" alt="Deadlinr Logo">
  </div>
  
  <div class="main-page">
    <h1 id="welcomeMessage"></h1>
    <div class="controls">
      <button id="add-class-btn">Add class +</button>
      <button onclick="openSubjectAdder()" id="subject-button">
        <span id="subject-button-text">Add subject +</span>
      </button>
    </div>

    <table class="deadlinr-table">
      <thead>
        <tr>
          <th>Assignment</th>
          <th>Class</th>
          <th>Status</th>
          <th>Due Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input class="assignment-input" type="text" value="Math homework"></td>
          <td><select class="class-select"></select></td>
          <td>
            <select class="status-select status-tag">
              <option value="todo">To do</option>
              <option value="in-progress">In progress</option>
              <option value="done">Done</option>
            </select>
          </td>
          <td><input class="due-date-input" type="date"></td>
          <td><button class="edit-row-btn">Edit</button></td>
        </tr>
      </tbody>
    </table>

    <div id="modal" class="subject-modal">
      <div class="subject-modal-content">
        <span onclick="closeSubjectAdder()" class="close">&times;</span>
        <h2>What subject would you like to add?</h2>
        <input type="text" id="subject" required>
        <button onclick="storeSubject()">Add subject</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
