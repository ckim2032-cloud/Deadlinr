<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deadlinr</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="sidebar">
    <img id="logo" src="images/logo.png" alt="Deadlinr Logo">
  </div>
  
  <div class="main-page">
    <h1 id="welcomeMessage"></h1>
    <div class="controls">
      <button id="add-class-btn">Add class +</button>
      <button id="delete-class-btn">Delete class -</button>
      <button id="add-row-btn">Add row +</button>
    </div>

    <table class="deadlinr-table" id="assignment-table">
      <thead>
        <tr>
          <th>Assignment</th>
          <th>Class</th>
          <th>Status</th>
          <th>Due Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input class="assignment-input" type="text" placeholder="Assignment"></td>
          <td><select class="class-select"></select></td>
          <td>
            <select class="status-select status-tag">
              <option value="todo">To do</option>
              <option value="in-progress">In progress</option>
              <option value="done">Done</option>
            </select>
          </td>
          <td><input class="due-date-input" type="date"></td>
          <td><button class="delete-row-btn">Delete</button></td>
        </tr>
      </tbody>
    </table>
  </div>
  <script src="script.js"></script>
</body>
</html>
