<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deadlinr Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sidebar">
    <img id="logo" src="images/logo.png" alt="Logo">
    <nav>
      <button onclick="showSection('dashboard-section')">Dashboard</button>
      <button onclick="showSection('tasks-section')">Tasks</button>
    </nav>
  </div>
  
  <main class="main-page">
    <header>
      <h1 id="welcomeMessage"></h1>
    </header>

    <div id="dashboard-section" class="section">
      <div class="stats-grid">
        <div class="glass-card"><h3>Total Tasks</h3><p id="stat-total">0</p></div>
        <div class="glass-card"><h3>Completed</h3><p id="stat-completed">0</p></div>
        <div class="glass-card"><h3>In Progress</h3><p id="stat-progress">0</p></div>
        <div class="glass-card"><h3>Overdue</h3><p id="stat-overdue">0</p></div>
      </div>
    </div>

    <div id="tasks-section" class="section" style="display:none;">
      <div class="controls">
        <button id="add-class-btn">Add class +</button>
        <button id="delete-class-btn">Delete class -</button>
        <button id="add-task-btn">Add task +</button>
      </div>
      <div class="glass-card table-wrapper">
        <table class="deadlinr-table" id="assignment-table">
          <thead><tr><th>Assignment</th><th>Class</th><th>Status</th><th>Due</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
