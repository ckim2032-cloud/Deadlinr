<head>
      <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>

  <body>
      <div class="main-page">
            <h1 id="welcomeMessage"></h1>
       <div style="text-align: right">
            <button onclick="openSubjectAdder()" id="subject-button"><span id="subject-button-text">Add subject +</span></button>
       </div>
      <div id="sidebar">
            <img id="logo" src="images/deadlinr-logo.png" alt="Deadlinr Logo">
      </div>
      <div id="modal" class="subject-modal">
        <div class="subject-modal-content">
          <span onclick="closeSubjectAdder()" class="close">&times;</span>
          <h2>What subject would you ike to add? </h2>
          <input type="text" id="subject" required>
          <button onclick="storeSubject()">Add subject</button>
        </div>
      </div>
       
    </div>
      
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const hour = new Date().getHours();
      let message;

      const morning = [
        "Good morning. Ready to start? 🌅",
        "Let's get ahead of the day. 🕗",
        "Good day to catch up."
      ];

      const afternoon = [
        "Let's keep the momentum going.",
        "Time to finish some work. 💼",
        "Keep going. Keep growing. 🌱"
      ];

      const evening = [
        "Last push for the day. 🌟",
        "Almost there.",
        "Let's wrap things up. 🌌"
      ];

      let messages;

      if (hour < 12) messages = morning;
      else if (hour < 17) messages = afternoon;
      else messages = evening;

      const random = Math.floor(Math.random() * messages.length);

      document.getElementById("welcomeMessage").textContent = messages[random];
      document.getElementById("welcomeMessage").style.opacity = "1";
    });
  </script>
</body>
</html>
