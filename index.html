<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deadlinr Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sidebar">
    <img id="logo" src="images/logo.png" alt="Deadlinr Logo">
    <nav class="nav-links">
      <button onclick="showPage('dashboard')">Dashboard</button>
      <button onclick="showPage('tasks')">Tasks</button>
      <button onclick="showPage('calendar')">Calendar</button>
    </nav>
  </div>
  
  <main class="main-content">
    <header>
      <h1>Good morning, Student! 🌅</h1>
      <input type="text" placeholder="Search tasks, projects...">
    </header>

    <div class="stats-grid">
      <div class="card"><h3>Total Tasks</h3><p>24</p></div>
      <div class="card"><h3>Completed</h3><p>16</p></div>
      <div class="card"><h3>In Progress</h3><p>5</p></div>
      <div class="card"><h3>Overdue</h3><p>3</p></div>
    </div>

    <section class="task-section">
      <h2>Upcoming Deadlines</h2>
      <table class="deadlinr-table" id="assignment-table">
        <thead><tr><th>Assignment</th><th>Class</th><th>Status</th><th>Due</th><th>Actions</th></tr></thead>
        <tbody>
          <tr>
            <td><input class="assignment-input" value="Math homework"></td>
            <td><select class="class-select"></select></td>
            <td><select class="status-select"><option value="todo">To do</option></select></td>
            <td><input class="due-date-input" type="date"></td>
            <td><button class="delete-task-btn">Delete</button></td>
          </tr>
        </tbody>
      </table>
      <button id="add-task-btn">Add Task +</button>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
